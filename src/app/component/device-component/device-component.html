<h2>Device List</h2>
 
<p>Total Devices: {{ devices.length }}</p>
 
<div *ngFor="let device of devices">
  <p>
    Name: {{ device.name }} |
    Part: {{ device.partNumber }} |
    Building: {{ device.buildingName }} |
    Type: {{ device.deviceType }} |
    Shelf: {{ device.noOfShelfPositions }}
  </p>
</div>
