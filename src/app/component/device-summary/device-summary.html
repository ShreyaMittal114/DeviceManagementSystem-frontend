<div class="container mt-4">
 
  <h2 class="text-center mb-4">Device Summary</h2>
 
  <!-- Device Details -->
  <div class="card p-3 mb-4 shadow-sm" *ngIf="device()">
 
    <table class="table table-bordered">
      <tbody>
        <tr>
          <th style="width:30%">Name</th>
          <td>{{device()?.name}}</td>
        </tr>
 
        <tr>
          <th>Part Number</th>
          <td>{{device()?.partNumber}}</td>
        </tr>
 
        <tr>
          <th>Building Name</th>
          <td>{{device()?.buildingName}}</td>
        </tr>
 
        <tr>
          <th>Device Type</th>
          <td>{{device()?.deviceType}}</td>
        </tr>
 
        <tr>
          <th>Total Shelf Positions</th>
          <td>{{device()?.noOfShelfPositions}}</td>
        </tr>
      </tbody>
    </table>
 
  </div>
 
 
  <!-- Shelf Positions Table -->
  <h3 class="mb-3">Shelf Positions</h3>
 
  <table class="table table-striped table-bordered table-hover">
 
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Status</th>
      </tr>
    </thead>
 
    <tbody>
 
      <tr *ngFor="let sp of ShelfPosition()">
        <td>{{sp.positionId}}</td>

   <td *ngIf="sp.Occupied">
    {{sp.shelf?.name}}
  </td>
     

  <td *ngIf="!sp.Occupied">
 
<select #shelfSelect class="form-select d-inline w-auto">
 
<option value="">Select Shelf</option>
 
<option *ngFor="let shelf of shelves" [value]="shelf.id">
{{ shelf.name }}
</option>
 
</select>
 
<button class="btn btn-primary ms-2"
(click)="assignShelf(shelfSelect.value,sp.positionId)">
Assign
</button>
 
</td>

      </tr>
 
    </tbody>
 
  </table>

 
 


<div class="d-flex justify-content-between mt-3">
 
  <button class="btn btn-success" (click)="updateDevice(device()?.id!)">
    Update
  </button>
 
  <button class="btn btn-danger" (click)="deleteDevice()">
    Delete Device
  </button>
 
</div>
