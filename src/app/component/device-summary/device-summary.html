<div class="container mt-4">
 
  <h2 class="text-center mb-4">Device Summary</h2>
 
  <!-- Device Details -->
  <div class="card p-3 mb-4 shadow-sm" *ngIf="device()">
 
    <table class="table table-bordered">
      <tbody>
        <tr>
          <th style="width:30%">Name</th>
          <td>{{device()?.name}}</td>
        </tr>
 
        <tr>
          <th>Part Number</th>
          <td>{{device()?.partNumber}}</td>
        </tr>
 
        <tr>
          <th>Building Name</th>
          <td>{{device()?.buildingName}}</td>
        </tr>
 
        <tr>
          <th>Device Type</th>
          <td>{{device()?.deviceType}}</td>
        </tr>
 
        <tr>
          <th>Total Shelf Positions</th>
          <td>{{device()?.noOfShelfPositions}}</td>
        </tr>
      </tbody>
    </table>
 
  </div>
 
 
  <!-- Shelf Positions Table -->
  <h3 class="mb-3">Shelf Positions</h3>
 
  <table class="table table-striped table-bordered table-hover">
 
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Status</th>
      </tr>
    </thead>
 
    <tbody>
 
      <tr *ngFor="let sp of ShelfPosition()">
        <td>{{sp.positionId}}</td>
        <td>
          <span class="badge bg-success" *ngIf="sp.Occupied">Occupied</span>
          <span class="badge bg-secondary" *ngIf="!sp.Occupied">Available</span>
        </td>
      </tr>
 
    </tbody>
 
  </table>

 
 
</div>
<div class = "container mt-3 text-end">
  <button
       type="button"
        class="btn btn-danger"
        (click)="deleteDevice()">
       Delete Device
      </button>

      </div>
